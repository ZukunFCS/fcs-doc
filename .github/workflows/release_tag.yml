name: Fast-forward release tag

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v3
      - run: pip install pyyaml
      - name: Fast-forward latest tag to HEAD
        run: |
          # Read the latest version (first entry) from versions.yaml
          TAG_NAME=$(python3 -c "
          import yaml
          with open('doc/versions.yaml') as f:
              docs = yaml.safe_load(f)
          first = next(iter(docs))
          print(docs[first].get('tag', first))
          ")

          echo "Updating tag: $TAG_NAME"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG_NAME"
          git push origin "$TAG_NAME" --force
